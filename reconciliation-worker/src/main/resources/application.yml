# File: reconciliation-worker/src/main/resources/application.yml
server:
  port: 8082

spring:
  application:
    name: payorch-reconciliation-worker
  
  datasource:
    url: jdbc:postgresql://localhost:5432/payorch_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # Validates the schema on startup without making changes; ensures it matches our entity definitions
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  batch:
    jdbc:
      initialize-schema: always # Auto-generates Spring Batch metadata tables on initial launch
    job:
      enabled: false # Disables automatic job execution on launch; execution is driven purely by our scheduler
