version: '3.8'

services:
  # =========================================================================
  # DATABASE TIER
  # =========================================================================
  payorch-postgres:
    image: postgres:15-alpine
    container_name: payorch-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =========================================================================
  # STREAMING INFRASTRUCTURE TIER (KAFKA BUFFER)
  # =========================================================================
  payorch-zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: payorch-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  payorch-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: payorch-kafka
    depends_on:
      - payorch-zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: payorch-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://payorch-kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  payorch-redis:
    image: redis:7-alpine
    container_name: payorch-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================================================
  # CORE ORCHESTRATION LAYER (PROCESSSES LIVE PAYMENTS & FAILS OVER)
  # =========================================================================
  core-orchestrator:
    build: ./core-orchestrator
    container_name: core-orchestrator
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payorch-postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: payorch-kafka:29092
      SPRING_DATA_REDIS_HOST: payorch-redis
      # Injected API Keys for live processing
      STRIPE_API_KEY: ${STRIPE_TEST_SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_TEST_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_TEST_KEY_SECRET}
    depends_on:
      payorch-postgres:
        condition: service_healthy
      payorch-kafka:
        condition: service_healthy
      payorch-redis:
        condition: service_healthy

  # =========================================================================
  # WEBHOOK INGESTION WORKER (ABSORBS INBOUND EVENT TRAFFIC STREAMS)
  # =========================================================================
  webhook-worker:
    build: ./webhook-worker
    container_name: webhook-worker
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: payorch-kafka:29092
    depends_on:
      payorch-kafka:
        condition: service_healthy

  # =========================================================================
  # RECONCILIATION WORKER (THE BATCH INTEGRITY DETECTION ENGINE)
  # =========================================================================
  reconciliation-worker:
    build: ./reconciliation-worker
    container_name: reconciliation-worker
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payorch-postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Injected API Keys for running live status reconciliations
      STRIPE_API_KEY: ${STRIPE_TEST_SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_TEST_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_TEST_KEY_SECRET}
    depends_on:
      payorch-postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local